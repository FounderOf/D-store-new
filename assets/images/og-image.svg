  <!-- Divider -->
  <rect x="80" y="230" width="400" height="3" rx="2" fill="url(#acc)"/>
  <!-- Products label -->
  <text x="80" y="290" font-family="Arial, sans-serif" font-size="20" fill="#94A3B8">Tersedia untuk:</text>
  <!-- Product chips row 1 -->
  <rect x="80" y="310" width="170" height="44" rx="10" fill="rgba(0,229,255,0.1)" stroke="#00E5FF" stroke-width="1.5"/>
  <text x="165" y="338" font-family="Arial, sans-serif" font-size="16" fill="#00E5FF" text-anchor="middle">Mobile Legends</text>
  <rect x="265" y="310" width="130" height="44" rx="10" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="330" y="338" font-family="Arial, sans-serif" font-size="16" fill="#F59E0B" text-anchor="middle">Free Fire</text>
  <rect x="410" y="310" width="150" height="44" rx="10" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1.5"/>
  <text x="485" y="338" font-family="Arial, sans-serif" font-size="16" fill="#10B981" text-anchor="middle">PUBG Mobile</text>
  <rect x="575" y="310" width="120" height="44" rx="10" fill="rgba(239,68,68,0.1)" stroke="#EF4444" stroke-width="1.5"/>
  <text x="635" y="338" font-family="Arial, sans-serif" font-size="16" fill="#EF4444" text-anchor="middle">Valorant</text>
  <!-- Product chips row 2 -->
