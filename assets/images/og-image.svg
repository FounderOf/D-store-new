  <text x="135" y="396" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#00E5FF" text-anchor="middle">ROBLOX ✦</text>
  <rect x="205" y="368" width="130" height="44" rx="10" fill="rgba(148,163,184,0.1)" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="270" y="396" font-family="Arial, sans-serif" font-size="16" fill="#94A3B8" text-anchor="middle">Steam Wallet</text>
  <rect x="350" y="368" width="130" height="44" rx="10" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1.5"/>
  <text x="415" y="396" font-family="Arial, sans-serif" font-size="16" fill="#10B981" text-anchor="middle">Google Play</text>
  <rect x="495" y="368" width="110" height="44" rx="10" fill="rgba(99,102,241,0.1)" stroke="#6366F1" stroke-width="1.5"/>
  <text x="550" y="396" font-family="Arial, sans-serif" font-size="16" fill="#818CF8" text-anchor="middle">& lainnya</text>
  <!-- Stats -->
  <text x="80" y="490" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF">50.000+</text>
  <text x="80" y="525" font-family="Arial, sans-serif" font-size="18" fill="#64748B">Transaksi Sukses</text>
  <text x="340" y="490" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF">15.000+</text>
  <text x="340" y="525" font-family="Arial, sans-serif" font-size="18" fill="#64748B">Pelanggan Aktif</text>
  <text x="600" y="490" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF">99%</text>
  <text x="600" y="525" font-family="Arial, sans-serif" font-size="18" fill="#64748B">Kepuasan</text>
  <!-- Right decoration -->
  <circle cx="1000" cy="315" r="200" fill="none" stroke="url(#acc)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="1000" cy="315" r="140" fill="none" stroke="url(#acc)" stroke-width="1" opacity="0.3"/>
  <circle cx="1000" cy="315" r="80" fill="rgba(0,229,255,0.05)" stroke="url(#acc)" stroke-width="1.5" opacity="0.5"/>
  <text x="1000" y="295" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#00E5FF" text-anchor="middle">D!</text>
  <text x="1000" y="335" font-family="Arial, sans-serif" font-size="16" fill="#94A3B8" text-anchor="middle">STORE</text>
  <!-- URL -->
  <text x="80" y="590" font-family="Arial, sans-serif" font-size="18" fill="#64748B">dstore.id</text>
